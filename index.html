<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인테리어 견적 계산기 | 파비디자인</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  max-width: 500px;
  margin: auto;
  padding: 20px;
  background: #f7f7f7;
}

h1 {
  text-align: center;
}

.top-text {
  text-align: center;
  font-weight: bold;
  margin-bottom: 10px;
}

.notice {
  text-align: center;
  font-size: 13px;
  color: #666;
}

label {
  display: block;
  margin-top: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border: none;
  font-size: 16px;
  border-radius: 6px;
}

.main { background: black; color: white; }
.kakao { background: #FEE500; color: #000; }
.pdf { background: #4CAF50; color: white; }

#result {
  margin-top: 20px;
  text-align: center;
  font-weight: bold;
}
</style>

</head>
<body>

<h1>인테리어 견적 계산기</h1>

<p class="top-text">✔ 10초만에 우리집 예상 견적 확인</p>
<p class="notice">※ 실제 시공 기준이며 현장에 따라 달라질 수 있습니다</p>

<label>이름</label>
<input type="text" id="name">

<label>연락처</label>
<input type="text" id="phone">

<label>평수</label>
<input type="number" id="pyung">

<label>철거</label>
<select id="demolition">
<option value="0">선택 안함</option>
<option value="150000">부분 철거</option>
<option value="300000">전체 철거</option>
</select>

<label>도배</label>
<select id="wall">
<option value="0">선택 안함</option>
<option value="120000">합지</option>
<option value="180000">실크</option>
</select>

<label>바닥</label>
<select id="floor">
<option value="0">선택 안함</option>
<option value="150000">장판</option>
<option value="250000">강마루</option>
</select>

<label>주방</label>
<select id="kitchen">
<option value="0">선택 안함</option>
<option value="3000000">기본</option>
<option value="6000000">아일랜드</option>
</select>

<label>욕실</label>
<select id="bathroom">
<option value="0">선택 안함</option>
<option value="2500000">기본</option>
<option value="4000000">고급</option>
</select>

<button class="main" onclick="calculate()">견적 계산</button>

<h2 id="result">예상 금액: -</h2>

<button onclick="copyResult()">견적 복사</button>
<button class="pdf" onclick="downloadPDF()">견적서 다운로드</button>
<button class="kakao" onclick="goKakao()">견적 기준으로 상담받기</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function calculate() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let pyung = document.getElementById("pyung").value;

  if (!name || !phone) {
    alert("이름과 연락처 입력해주세요");
    return;
  }

  if (!pyung) {
    alert("평수를 입력하세요");
    return;
  }

  let demolition = +document.getElementById("demolition").value;
  let wall = +document.getElementById("wall").value;
  let floor = +document.getElementById("floor").value;
  let kitchen = +document.getElementById("kitchen").value;
  let bathroom = +document.getElementById("bathroom").value;

  let base = pyung * 500000;
  let total = base + demolition + wall + floor + kitchen + bathroom;

  let min = total * 0.9;
  let max = total * 1.2;

  let resultText = name + "님 예상 견적: " +
    Math.floor(min).toLocaleString() + "원 ~ " +
    Math.floor(max).toLocaleString() + "원";

  document.getElementById("result").innerText = resultText;

  sendData(name, phone, resultText);
}

function copyResult() {
  let text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("복사 완료");
}

function goKakao() {
  let result = document.getElementById("result").innerText;

  if (result === "예상 금액: -") {
    alert("먼저 견적 계산해주세요");
    return;
  }

  window.open("https://pf.kakao.com/_uGcyn", "_blank");
}

function downloadPDF() {
  let element = document.getElementById("result");

  html2pdf().from(element).save("견적서.pdf");
}

function sendData(name, phone, result) {
  fetch("https://script.google.com/macros/s/XXXX/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      phone: phone,
      result: result
    }),
    headers: {
      "Content-Type": "application/json"
    }
  });
}
</script>

</body>
</html>
